version: "3.8"

services:
  control-center:
    image: ghcr.io/rdone4425/openclaw-control-center:latest
    container_name: openclaw-control-center
    restart: unless-stopped
    ports:
      - "4310:4310"
      - "18789:18789"
    environment:
      NODE_ENV: production
      UI_MODE: "true"
      UI_PORT: "4310"
      UI_BIND_ADDRESS: "0.0.0.0"
      READONLY_MODE: "true"
      LOCAL_TOKEN_AUTH_REQUIRED: "true"
      LOCAL_API_TOKEN: "change-this-token"
      GATEWAY_URL: "host.docker.internal:18789"
      OPENCLAW_HOME: "/data/.openclaw"
      OPENCLAW_CONFIG_PATH: "/data/.openclaw/openclaw.json"
      OPENCLAW_WORKSPACE_ROOT: "/data/workspace"
      CODEX_HOME: "/data/.codex"
    volumes:
      - openclaw-home:/data/.openclaw
      - openclaw-workspace:/data/workspace
      - codex-home:/data/.codex
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openclaw-home:
    driver: local
  openclaw-workspace:
    driver: local
  codex-home:
    driver: local
